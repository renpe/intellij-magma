pluginGroup = com.renpe.intellij.magma
pluginVersion = 1.1.0

# Plugin compatibility range. Lower bound is 2025.1 (build 251) — that's
# where FileChooserDescriptorFactory.singleFile()/singleDir() appeared
# and where the 2-arg TextFieldWithBrowseButton.addBrowseFolderListener
# overload became available, both of which the run-config UI uses.
pluginSinceBuild = 251
pluginUntilBuild = 262.*

# Development target — what we compile against and what `runIde` boots.
# Use a recent stable build so the sandbox IDE works in the current
# Java/Gradle ecosystem. This does NOT restrict who can install the plugin.
# Since 2025.3 IC and IU are merged into one unified IDEA distribution.
platformVersion = 2026.1

javaVersion = 21

kotlin.stdlib.default.dependency = false
org.gradle.jvmargs = -Xmx2g -XX:+UseG1GC
